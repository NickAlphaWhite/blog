<script>
(function(){
var l=document.getElementById("lock"),pw=document.getElementById("lockPw"),er=document.getElementById("lockErr");
if(!l||!pw)return;
if(localStorage.getItem("admin-auth")==="1"){l.classList.add("hidden");return}
pw.focus();
pw.addEventListener("keydown",function(e){if(e.key==="Enter"){if(pw.value==="@20080922"){l.classList.add("hidden");localStorage.setItem("admin-auth","1")}else{er.style.display="block";pw.value=""}}});
})();

var i18n={},lang="zh",curLang="zh";
var m=location.pathname.match(/\/admin\/(\w+)/);
if(m){var rm={cn:"zh",us:"en",jp:"ja",kr:"ko",fr:"fr",de:"de"};lang=rm[m[1]]||"zh";curLang=lang}
window.lang=lang;
var langNames={zh:"中文",en:"English",ja:"日本語",ko:"한국어",fr:"Français",de:"Deutsch"};
var allLangs=["zh","en","ja","ko","fr","de"];
function t(key){return (i18n[lang]||{})[key]||(i18n.en||{})[key]||key}
async function loadI18n(){try{var r=await fetch("/api/i18n");i18n=await r.json()}catch(e){}applyLang();var ls=document.getElementById("langSelect");if(ls)ls.value=lang}
function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){if(!el.tagName.match(/SELECT|BUTTON|INPUT|TEXTAREA/))el.textContent=t(el.dataset.i18n)});
  document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el){el.placeholder=t(el.dataset.i18nPlaceholder)});
  var cs=document.querySelector('select[name="category"]');if(cs)cs.options[0].text=t("categoryPlaceholder");
  var ss=document.getElementById("subcatSelect");if(ss)ss.options[0].text=t("subcategoryPlaceholder");
  var nt=document.getElementById("navTitle");if(nt)nt.textContent=t("siteTitle");
  var vs=document.getElementById("viewSiteLink");if(vs)vs.textContent=t("viewSite");
  document.title=t("siteTitle");
  var ef=document.getElementById("editFile").value;
  var sb=document.getElementById("submitBtn");if(sb)sb.textContent=ef?t("update"):t("publish");
  var ce=document.getElementById("cancelEditBtn");if(ce)ce.textContent=t("cancelEdit");
  var tw=document.querySelector('[data-view="write"]');if(tw)tw.textContent=t("write");
  var tl=document.querySelector('[data-view="list"]');if(tl)tl.textContent=t("allPosts");
  var tc=document.querySelector('[data-view="cats"]');if(tc)tc.textContent=t("categories");
  var ub=document.querySelector('.btn.ghost[onclick*="imageUpload"]');if(ub)ub.textContent=t("upload");
  var tca=document.getElementById("transCancel");if(tca)tca.textContent=t("cancelEdit");
  var tsa=document.getElementById("transSave");if(tsa)tsa.textContent=t("publish");
  if(document.getElementById("view-list").style.display!=="none")loadPosts();
  if(document.getElementById("view-cats").style.display!=="none")loadCats();
}
loadI18n();

(function(){var s=localStorage.getItem("theme");if(s)document.documentElement.setAttribute("data-theme",s);else if(window.matchMedia("(prefers-color-scheme:dark)").matches)document.documentElement.setAttribute("data-theme","dark")})();
function toggleTheme(){var c=document.documentElement.getAttribute("data-theme"),n=c==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",n);localStorage.setItem("theme",n)}

document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click",function(){
    var v=this.dataset.view;
    document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active")});
    this.classList.add("active");
    document.getElementById("view-write").style.display=v==="write"?"":"none";
    document.getElementById("view-list").style.display=v==="list"?"":"none";
    document.getElementById("view-cats").style.display=v==="cats"?"":"none";
    if(v==="list")loadPosts();
    if(v==="cats")loadCats();
  });
});

document.getElementById("dateField").value=new Date().toISOString().split("T")[0];

document.getElementById("imageUpload").addEventListener("change",async function(){
  var file=this.files[0];if(!file)return;
  var fd=new FormData();fd.append("image",file);
  try{var r=await fetch("/api/upload",{method:"POST",body:fd});var j=await r.json();if(j.url)document.querySelector('input[name="image"]').value=j.url}catch(e){}
});

var allCats={};
(async function(){try{var r=await fetch("/api/categories");allCats=await r.json()}catch(e){}})();
document.querySelector('select[name="category"]').addEventListener("change",function(){
  var sel=this.value,sub=document.getElementById("subcatSelect");
  sub.innerHTML='<option value="">'+t("subcategoryPlaceholder")+'</option>';
  if(allCats[sel]&&allCats[sel].subcategories)Object.keys(allCats[sel].subcategories).forEach(function(s){sub.innerHTML+='<option value="'+s+'">'+s+'</option>'});
});

var langCache={zh:{title:"",subtitle:"",content:""},en:{title:"",subtitle:"",content:""},ja:{title:"",subtitle:"",content:""},ko:{title:"",subtitle:"",content:""},fr:{title:"",subtitle:"",content:""},de:{title:"",subtitle:"",content:""}};
function saveCurrent(){langCache[curLang]={title:document.getElementById("langTitle").value,subtitle:document.getElementById("langSubtitle").value,content:document.getElementById("contentTA").value}}
function loadLang(l){
  saveCurrent();curLang=l;lang=l;applyLang();
  var rm2={zh:"cn",en:"us",ja:"jp",ko:"kr",fr:"fr",de:"de"};
  var newUrl=location.pathname.replace(/\/admin\/\w*\/?$/,"/admin/"+(rm2[l]||l)+"/");
  if(newUrl!==location.pathname)history.replaceState(null,"",newUrl);
  document.getElementById("langTitle").value=langCache[l].title||"";
  document.getElementById("langSubtitle").value=langCache[l].subtitle||"";
  document.getElementById("contentTA").value=langCache[l].content||"";
  document.getElementById("langSelect").value=l;
}
document.getElementById("langSelect").addEventListener("change",function(){loadLang(this.value)});

var editingFile=null,groupSlug=null;
document.getElementById("publishForm").addEventListener("submit",async function(e){
  e.preventDefault();saveCurrent();
  var fd=new FormData(e.target),data=Object.fromEntries(fd.entries());
  data.featured=!!fd.get("featured");
  var zhTitle=data.titleZh,date=data.date||new Date().toISOString().split("T")[0];
  if(!zhTitle)return toast("中文标题不能为空","err");
  var base=zhTitle.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  var slug=date+"-"+base,ok=0;
  for(var i=0;i<allLangs.length;i++){
    var l=allLangs[i],c=langCache[l];
    if(!c.title&&!c.content&&l!=="zh"&&l!=="en")continue;
    var pd={title:l==="zh"?zhTitle:c.title||zhTitle,titleZh:zhTitle,subtitle:c.subtitle||"",date:date,category:data.category,subcategory:data.subcategory,lang:l,image:data.image,content:c.content,featured:data.featured,group:groupSlug||slug};
    var url=editingFile&&l===curLang?"/api/posts/"+encodeURIComponent(editingFile):"/api/publish";
    var res=await fetch(url,{method:editingFile?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(pd)});
    var j=await res.json();if(j.ok)ok++;
  }
  if(ok)toast("已发布 "+ok+" 个语言版本");else toast("发布失败","err");
  if(!editingFile){resetEditor();document.getElementById("masterTitle").value="";document.getElementById("dateField").value=new Date().toISOString().split("T")[0]}
});
function resetEditor(){
  curLang="zh";
  langCache={zh:{title:"",subtitle:"",content:""},en:{title:"",subtitle:"",content:""},ja:{title:"",subtitle:"",content:""},ko:{title:"",subtitle:"",content:""},fr:{title:"",subtitle:"",content:""},de:{title:"",subtitle:"",content:""}};
  document.getElementById("langTitle").value="";document.getElementById("langSubtitle").value="";document.getElementById("contentTA").value="";
  document.getElementById("langSelect").value="zh";editingFile=null;groupSlug=null;
  document.getElementById("editFile").value="";
  document.getElementById("submitBtn").textContent=t("publish");
  document.getElementById("cancelEditBtn").style.display="none";
}
function cancelEdit(){document.getElementById("publishForm").reset();resetEditor();document.getElementById("dateField").value=new Date().toISOString().split("T")[0]}

async function editPost(file){
  try{
    var res=await fetch("/api/posts/"+encodeURIComponent(file)),j=await res.json();
    var raw=j.content,fmMatch=raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)/);
    if(!fmMatch)return;var fm=fmMatch[1],body=fmMatch[2]||"";
    var get=function(k){var m=fm.match(new RegExp(k+':\\s*"?([^\\n"]*)"?'));return m?m[1].trim():""};
    groupSlug=get("group")||"";var postLang=get("lang")||"zh";
    resetEditor();var form=document.getElementById("publishForm");
    form.titleZh.value=get("titleZh").replace(/^"|"$/g,"")||get("title").replace(/^"|"$/g,"");
    form.date.value=get("date");form.category.value=get("category");
    form.subcategory.value=get("subcategory");form.image.value=get("image");
    form.featured.checked=fm.indexOf("featured: true")>=0;
    langCache[postLang]={title:get("title").replace(/^"|"$/g,""),subtitle:get("subtitle"),content:body.trim()};
    editingFile=file;document.getElementById("editFile").value=file;
    document.getElementById("submitBtn").textContent="更新";
    document.getElementById("cancelEditBtn").style.display="";
    loadLang(postLang);document.querySelector('[data-view="write"]').click();window.scrollTo(0,0);
  }catch(e){toast("加载失败","err")}
}

async function loadPosts(){
  var el=document.getElementById("postList");if(!el)return;
  try{
    var res=await fetch("/api/posts"),posts=await res.json(),h="";
    if(!posts.length)h='<div class="post-item"><span style="color:var(--txt3)">'+t("noPosts")+'</span></div>';
    else posts.forEach(function(p){
      var lb={zh:"中",en:"EN",ja:"日",ko:"한",fr:"FR",de:"DE"}[p.lang]||"";
      h+='<div class="post-item"><div><div class="name">'+esc(p.title)+' <span style="font-size:0.7rem;color:var(--txt3);background:var(--bg3);padding:1px 6px;border-radius:4px">'+lb+'</span></div><div class="file">'+esc(p.file)+'</div></div><div class="actions"><a href="http://localhost:3000/'+p.slug+'" target="_blank" style="padding:7px 16px;border-radius:8px;border:1px solid var(--hairline);color:var(--txt2);text-decoration:none;font-size:0.78rem;font-family:var(--font)">'+t("viewPost")+'</a><button onclick="editPost(\''+esc(p.file)+'\')">'+t("editPost")+'</button><button onclick="delPost(\''+esc(p.file)+'\')">'+t("deletePost")+'</button></div></div>';
    });
    el.innerHTML=h;
  }catch(err){el.innerHTML='<div class="post-item"><span style="color:var(--txt3)">'+t("errorLoading")+'</span></div>'}
}
async function delPost(file){if(!confirm("确认删除?"))return;await fetch("/api/posts/"+encodeURIComponent(file),{method:"DELETE"});loadPosts();toast("已删除")}

async function loadCats(){
  var el=document.getElementById("catList");if(!el)return;
  try{
    var res=await fetch("/api/categories"),cats=await res.json(),h="";
    Object.keys(cats).sort().forEach(function(c){
      var cat=cats[c],label=cat.label||{},subs=cat.subcategories||{};
      var displayName=label[lang]||label.zh||label.en||c;
      var addPh=langNames[lang]||"name";
      h+='<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="font-size:1.05rem;font-weight:600"><a href="#" onclick="editCatLabel(\''+esc(c)+'\');return false" style="color:var(--txt);text-decoration:none;border-bottom:1px dashed var(--txt3)">'+esc(displayName)+'</a></h3><button class="btn" style="background:#e74c3c;font-size:0.7rem;padding:5px 12px" onclick="delCat(\''+esc(c)+'\')">'+t("deletePost")+'</button></div><div style="display:flex;flex-wrap:wrap;gap:6px">'+Object.keys(subs).sort().map(function(s){var sl=subs[s];var slLabel=typeof sl==="object"?sl:{zh:sl,en:s};return '<a href="#" onclick="editSubLabel(\''+esc(c)+'\',\''+esc(s)+'\');return false" style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg3);border-radius:6px;font-size:0.78rem;color:var(--txt2);text-decoration:none;border:1px solid transparent" onmouseover="this.style.borderColor=\'var(--txt3)\'" onmouseout="this.style.borderColor=\'transparent\'">'+(slLabel[lang]||slLabel.zh||slLabel.en||s)+' <button onclick="delSub(\''+esc(c)+'\',\''+esc(s)+'\')" style="border:none;background:none;color:var(--txt3);cursor:pointer;font-size:0.85rem;margin-left:2px">&times;</button></a>'}).join("")+'</div><form onsubmit="addSub(event,\''+esc(c)+'\')" style="display:flex;gap:6px;margin-top:10px"><input placeholder="'+esc(addPh)+'" style="flex:1;padding:5px 8px;border:1px solid var(--hairline);border-radius:6px;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:0.78rem;outline:none"><button type="submit" class="btn" style="font-size:0.7rem;padding:5px 12px">'+t("addSubcategory")+'</button></form></div>';
    });
    if(!h)h='<p style="color:var(--txt3);text-align:center;padding:40px">'+t("noCategories")+'</p>';
    el.innerHTML=h;
  }catch(err){el.innerHTML='<p style="color:var(--txt3);text-align:center;padding:40px">'+t("errorLoading")+'</p>'}
}
document.getElementById("catForm").addEventListener("submit",async function(e){
  e.preventDefault();var fd=new FormData(e.target);var name=fd.get("catName").trim();if(!name)return;
  var subsStr=fd.get("catSubs").trim();var initSubs={};
  if(subsStr)subsStr.split(",").forEach(function(s){s=s.trim();if(s)initSubs[s]={zh:s,en:s}});
  var res=await fetch("/api/categories/"+encodeURIComponent(name),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({subcategories:initSubs})});
  var j=await res.json();if(j.ok){e.target.reset();loadCats()}else toast(j.error,"err");
});
async function delCat(name){if(!confirm('Delete "'+name+'"?'))return;await fetch("/api/categories/"+encodeURIComponent(name),{method:"DELETE"});loadCats()}
async function addSub(e,cat){e.preventDefault();var s=e.target.querySelector("input").value.trim();if(!s)return;await fetch("/api/categories/"+encodeURIComponent(cat)+"/subcategories",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({subcategory:s,lang:window.lang})});e.target.querySelector("input").value="";loadCats()}
async function delSub(cat,sub){await fetch("/api/categories/"+encodeURIComponent(cat)+"/subcategories/"+encodeURIComponent(sub),{method:"DELETE"});loadCats()}

function openModal(title,data,onSave){
  var overlay=document.getElementById("transOverlay"),fields=document.getElementById("transFields");
  document.getElementById("transTitle").textContent=title;var h="";
  allLangs.forEach(function(l){
    var val=data[l]||"",ph=data.en||"";if(!val)ph=ph+" ("+t("needsTranslation")+")";
    h+='<div class="sel"><span>'+langNames[l]+'</span><input value="'+esc(val)+'" placeholder="'+esc(ph)+'" data-lang="'+l+'" style="padding:8px 12px;border:1px solid var(--hairline);border-radius:8px;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:0.9rem;outline:none"></div>';
  });
  fields.innerHTML=h;overlay.style.display="flex";overlay.classList.add("open");overlay._onSave=onSave;
}
function closeModal(){var o=document.getElementById("transOverlay");o.style.display="none";o.classList.remove("open")}
document.getElementById("transSave").addEventListener("click",function(){
  var overlay=document.getElementById("transOverlay"),data={};
  document.querySelectorAll("#transFields input").forEach(function(inp){data[inp.dataset.lang]=inp.value.trim()});
  if(overlay._onSave)overlay._onSave(data);closeModal();
});
async function editCatLabel(cat){
  var res=await fetch("/api/categories"),cats=await res.json();
  openModal(cat,cats[cat]?cats[cat].label||{}:{},async function(data){cats[cat].label=data;await fetch("/api/categories",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(cats)});loadCats()});
}
async function editSubLabel(cat,sub){
  var res=await fetch("/api/categories"),cats=await res.json();
  var sl=cats[cat].subcategories[sub];
  openModal(cat+" / "+sub,typeof sl==="object"?sl:{en:sub},async function(data){cats[cat].subcategories[sub]=data;await fetch("/api/categories",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(cats)});loadCats()});
}

function esc(s){var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML}
function toast(msg,type){var t=document.createElement("div");t.className="toast"+(type==="err"?" err":"");t.innerHTML=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},5000)}
</script>
</body>
</html>
